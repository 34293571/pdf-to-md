services:
  - type: web
    name: pdfamd-api
    runtime: python
    plan: free
    rootDir: services/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://pdfamd.com,http://localhost:3000
      - key: MAX_BYTES
        value: "10485760"
      - key: MAX_PAGES
        value: "50"
      - key: MIN_CHARS_PER_PAGE
        value: "50"
      - key: CONVERTER_VERSION
        value: "0.1.0"
      - key: PYTHON_VERSION
        value: "3.11.11"
